name: Build and Publish Docker Images

on:
  push:
    branches: [main, master]
    paths:
      - 'apps/client/**'
      - 'apps/server/**'
      - 'Caddyfile'
      - '.github/workflows/docker-publish.yml'

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build client image
        run: |
          docker build \
            -f apps/client/Dockerfile \
            -t ${{ env.REGISTRY }}/${{ github.repository_owner }}/bordle-client:latest \
            .

      - name: Build server image
        run: |
          docker build \
            -f apps/server/Dockerfile \
            -t ${{ env.REGISTRY }}/${{ github.repository_owner }}/bordle-server:latest \
            .

      # Push only after both builds succeed
      - name: Push client image
        run: docker push ${{ env.REGISTRY }}/${{ github.repository_owner }}/bordle-client:latest

      - name: Push server image
        run: docker push ${{ env.REGISTRY }}/${{ github.repository_owner }}/bordle-server:latest
