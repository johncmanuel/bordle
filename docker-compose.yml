# dev
services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      # keeping it the same throughout
      POSTGRES_USER: bordle
      POSTGRES_PASSWORD: bordle
      POSTGRES_DB: bordle
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bordle -d bordle"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles: [dev]

volumes:
  postgres_data:
